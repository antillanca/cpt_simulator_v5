    tags: ["neural", "destilacion", "arena"]
    dependencies: ["v2.7"]
    artifacts: ["neural/tiny_experiments.py", "neural/trainers/", "neural/evaluators/"]
    doc_refs: ["docs/V27_DISTILLATION_READINESS.md"]

